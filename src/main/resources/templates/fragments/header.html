<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <!--
  header.html
  ─────────────────────────────────────────────────────────────
  Site-wide header. Pulls navbar from navbar.html so nav links
  have a single source of truth.

  Usage in base.html (or any template):
    <header th:replace="~{fragments/header :: header}"></header>

  What lives here vs navbar.html:
    • Brand mark / logo         → here
    • Right-side auth buttons   → here (Login / Register / Logout)
    • Nav link list             → navbar.html (th:replace below)
  ─────────────────────────────────────────────────────────────
-->

  <header th:fragment="header" class="sticky top-0 z-50 w-full border-b border-stone-200 bg-white/90 backdrop-blur-sm">
    <div class="mx-auto flex h-16 max-w-7xl items-center justify-between gap-6 px-6">
      <!-- ── Brand mark ─────────────────────────────────────── -->
      <a th:href="@{/}" class="shrink-0 text-xl font-bold tracking-tight text-stone-900 select-none"> BUSANA<span class="text-amber-500">.my</span> </a>

      <!-- ── Primary navigation (sourced from navbar.html) ──── -->
      <nav th:replace="~{fragments/navbar :: navbar}"></nav>

      <!-- ── Right-side auth controls ──────────────────────── -->
      <div class="flex shrink-0 items-center gap-3">
        <!-- Guest state: show Login + Register -->
        <th:block th:if="${session.customerId == null and session.adminId == null}">
          <a th:href="@{/login}" class="text-sm text-stone-600 transition-colors duration-150 hover:text-stone-900"> Login </a>
          <a th:href="@{/register}" class="rounded-full bg-stone-900 px-4 py-1.5 text-sm text-white transition-colors duration-150 hover:bg-amber-500"> Register </a>
        </th:block>

        <!-- Customer logged in: show greeting + Logout -->
        <th:block th:if="${session.customerId != null}">
          <span class="text-sm text-stone-500" th:text="'Hi, ' + ${session.customerName ?: 'there'}">Hi, there</span>
          <form th:action="@{/logout}" method="post" class="inline">
            <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <button type="submit" class="text-sm text-stone-600 transition-colors duration-150 hover:text-red-500">Logout</button>
          </form>
        </th:block>

        <!-- Admin logged in: show admin badge + Logout -->
        <th:block th:if="${session.adminId != null}">
          <span class="rounded-full bg-amber-100 px-2 py-1 text-xs font-medium text-amber-700"> Admin </span>
          <form th:action="@{/admin/logout}" method="post" class="inline">
            <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <button type="submit" class="text-sm text-stone-600 transition-colors duration-150 hover:text-red-500">Logout</button>
          </form>
        </th:block>
      </div>
    </div>
  </header>
</html>
