<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Order Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Fraunces:opsz,wght@9..144,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body class="admin-shell">
    <header class="admin-topbar">
        <div>
            <p class="eyebrow">Admin Panel</p>
            <h1>Order Managenment</h1>
        </div>
        <div class="button-row">
            <!-- <a class="button-secondary" th:href="@{/admin/orders}">Customer View</a> -->
            <!-- <a class="button-primary" th:href="@{/admin/products/new}">Add New Product</a> -->
        </div>
    </header>

    <main class="admin-main">
        <section class="surface-panel" th:if="${successMessage}">
            <p class="feedback success" th:text="${successMessage}"></p>
        </section>

        <section class="surface-panel" th:if="${errorMessage}">
            <p class="feedback error" th:text="${errorMessage}"></p>
        </section>

        <section class="catalogue-toolbar surface-panel">
            <div class="section-heading">
                <!-- <p class="eyebrow">Filters</p> -->
                <h2>View and manage orders</h2>
            </div>

                <table style="width:100%">
                <tr>
                    <th>Order No</th>
                    <th>Order Date</th>
                    <th>Order Status</th>
                    <th>Customer ID</th>
                </tr>
                <tr th:each="order: ${orders}">
                    <td th:text="${order.orderID}" ></td>   
                    <td th:text="${order.orderDate}" ></td>                    
                    <td th:text="${order.orderStatus}" ></td>                    
                    <td th:text="${order.customer.customerID}" ></td>                    
                 
                </tr>
                </table>


                </div>
            </article>
        </section>
    </main>
</body>
</html>
