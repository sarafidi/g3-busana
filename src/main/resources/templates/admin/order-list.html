<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Order Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Fraunces:opsz,wght@9..144,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body class="admin-shell">
    <header class="admin-topbar">
        <div>
            <p class="eyebrow">Admin Panel</p>
            <h1>Order List</h1>
        </div>
    </header>

    <main class="admin-main">
        <!-- <section class="surface-panel" th:if="${successMessage}">
            <p class="feedback success" th:text="${successMessage}"></p>
        </section> -->

        <!-- <section class="surface-panel" th:if="${errorMessage}">
            <p class="feedback error" th:text="${errorMessage}"></p>
        </section> -->

        <section class="catalogue-toolbar surface-panel">
            <div class="section-heading">
                <!-- <p class="eyebrow">Filters</p> -->
                <h2>View and manage orders</h2>
            </div>
            <div class="table-container">
                <table style="width:100%" >
                <thead>
                <tr>
                    <th>Order No</th>
                    <th>Customer ID</th>
                    <th>Customer Name</th>
                    <th>Order Date</th>
                    <th>Total Amount</th>
                    <th>Order Status</th>
                    <th>Action</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="order: ${orders}">
                    <td th:text="${order.orderID}" ></td> 
                    <td th:text="${order.customer.customerID}" ></td>                    
                    <td th:text="${order.customer.name}" ></td>                    
                    <td th:text="${#temporals.format(order.orderDate, 'dd MMMM yyyy')}"></td>
                    <td th:text="'RM ' + ${#numbers.formatDecimal(order.totalAmount, 1, 'COMMA', 2, 'POINT')}"></td>
                    <td th:text="${order.orderStatus}" ></td>                     
                    <td><a class="action-button" th:href="@{'/admin/orders/' + ${order.orderID}}">View</a></td>                                          
                </tr>
                </tbody>
                </table>
            </div>
        </section>
    </main>
</body>
</html>
