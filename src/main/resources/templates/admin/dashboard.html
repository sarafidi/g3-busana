<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | BUSANA.my</title>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background: #f3f4f6; color: #111827; }
        .container { max-width: 960px; margin: 0 auto; padding: 40px 24px; }
        .card { background: #ffffff; border-radius: 20px; box-shadow: 0 20px 60px rgba(15, 23, 42, 0.08); padding: 36px; }
        h1 { margin: 0 0 12px; font-size: 2rem; color: #1f2937; }
        p { margin: 0 0 20px; color: #4b5563; line-height: 1.7; }
        .actions a { display: inline-block; margin-right: 12px; padding: 12px 22px; border-radius: 999px; text-decoration: none; color: #ffffff; background: #2563eb; font-weight: 600; }
        .actions a.secondary { background: #6b7280; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Admin Dashboard Placeholder</h1>
            <p>This is a placeholder page for the admin dashboard. Replace this content with your real admin controls, reports, and navigation once the admin interface is ready.</p>
            <div class="actions">
                <a th:href="@{/admin/logout}">Logout</a>
                <a th:href="@{/admin/login}">Admin Login</a>
                <a class="secondary" th:href="@{/}">Home</a>
            </div>
        </div>
    </div>
</body>
</html>
