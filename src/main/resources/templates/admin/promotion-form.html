<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' | BUSANA.my'">Promotion Form</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts: Instrument Sans & Prata -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Prata&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Instrument Sans', sans-serif;
            background-color: #fffbf6;
            color: #2d201a;
        }
        .serif-font {
            font-family: 'Prata', serif;
        }
    </style>
</head>
<body class="min-h-screen flex bg-[#fffbf6]">

    <!-- Sidebar Navigation -->
    <aside th:replace="~{fragments/admin-sidebar :: sidebar('promotions')}"></aside>

    <!-- Main Content Area -->
    <main class="flex-grow p-8 max-w-4xl mx-auto overflow-y-auto">

        <!-- Header -->
        <header class="flex items-center justify-between mb-8 pb-6 border-b border-[#3f291f]/5">
            <div>
                <span class="text-[10px] uppercase tracking-wider font-extrabold text-[#b4572d]" th:text="${promotion != null and promotion.promotionID != null} ? 'Edit Campaign' : 'New Campaign'">Operations</span>
                <h2 class="text-3xl font-bold text-[#2d201a] tracking-tight mt-0.5" th:text="${pageTitle}">Promotion Form</h2>
            </div>

            <a th:href="@{/admin/promotions}" class="inline-flex items-center gap-2 bg-white hover:bg-stone-50 border border-[#3f291f]/10 text-stone-600 text-xs font-semibold px-4 py-2.5 rounded-xl transition shadow-sm">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
                </svg>
                Back to Campaigns
            </a>
        </header>

        <!-- Error messages -->
        <div th:if="${errorMessage}" class="mb-6 p-4 rounded-2xl bg-[#fff5eb] border border-red-200 text-red-700 text-sm font-medium flex gap-3 items-center">
            <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z" />
            </svg>
            <span th:text="${errorMessage}">Error Message</span>
        </div>

        <!-- Form Binding -->
        <form class="space-y-8" th:object="${promotion}" method="post"
              th:action="${promotion != null and promotion.promotionID != null} ? @{/admin/promotions/{id}(id=${promotion.promotionID})} : @{/admin/promotions}">

            <!-- Details Container Card -->
            <div class="bg-white border border-[#3f291f]/10 rounded-3xl p-6 sm:p-8 shadow-sm space-y-6">
                <div>
                    <h3 class="text-lg font-bold text-[#2d201a]">Campaign Specifications</h3>
                    <p class="text-xs text-[#6e5a4e] mt-0.5">Primary specifications, value rules, category restrictions, and active statuses.</p>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">

                    <!-- Code / ID -->
                    <div class="space-y-1.5">
                        <label class="text-xs font-bold text-[#6e5a4e]">Promotion Code / ID</label>
                        <!-- Editable if new, readonly if editing -->
                        <input type="text" th:field="*{promotionID}"
                               th:readonly="${promotion != null and promotion.promotionID != null}"
                               th:classappend="${promotion != null and promotion.promotionID != null} ? 'bg-[#fff5eb]/40 text-stone-400 border-[#3f291f]/10' : 'bg-[#fffbf6] border-[#3f291f]/15 focus:border-[#b4572d]'"
                               placeholder="e.g. VIP20, MEGASALE" required
                               class="w-full px-4 py-2.5 rounded-xl border text-sm font-medium focus:outline-none transition">
                        <p th:if="${promotion == null or promotion.promotionID == null}" class="text-[10px] text-stone-400 mt-1">This code is what customers will type to apply discounts during checkout.</p>
                    </div>

                    <!-- Publishing Status -->
                    <div class="space-y-1.5">
                        <label class="text-xs font-bold text-[#6e5a4e]">Campaign Status</label>
                        <select th:field="*{status}" class="w-full px-4 py-2.5 rounded-xl border border-[#3f291f]/15 bg-[#fffbf6] focus:outline-none focus:border-[#b4572d] text-sm font-medium">
                            <option value="active">Active (Eligible)</option>
                            <option value="inactive">Inactive (Disabled)</option>
                        </select>
                    </div>

                    <!-- Campaign Name -->
                    <div class="space-y-1.5">
                        <label class="text-xs font-bold text-[#6e5a4e]">Campaign Name</label>
                        <input type="text" th:field="*{promotionName}" placeholder="e.g. Raya Special Celebration" required
                               class="w-full px-4 py-2.5 rounded-xl border border-[#3f291f]/15 bg-[#fffbf6] focus:outline-none focus:border-[#b4572d] text-sm font-medium">
                    </div>

                    <!-- Applicable Category -->
                    <div class="space-y-1.5">
                        <label class="text-xs font-bold text-[#6e5a4e]">Applicable Category</label>
                        <select th:field="*{applicableCategory}" class="w-full px-4 py-2.5 rounded-xl border border-[#3f291f]/15 bg-[#fffbf6] focus:outline-none focus:border-[#b4572d] text-sm font-medium">
                            <option value="">All Categories (Storewide)</option>
                            <option value="Tops">Tops</option>
                            <option value="Bottoms">Bottoms</option>
                            <option value="Accessories">Accessories</option>
                        </select>
                    </div>

                    <!-- Discount Type -->
                    <div class="space-y-1.5">
                        <label class="text-xs font-bold text-[#6e5a4e]">Discount Type</label>
                        <select th:field="*{discountType}" required class="w-full px-4 py-2.5 rounded-xl border border-[#3f291f]/15 bg-[#fffbf6] focus:outline-none focus:border-[#b4572d] text-sm font-medium">
                            <option value="percentage">Percentage (%)</option>
                            <option value="flat">Fixed Amount (RM)</option>
                        </select>
                    </div>

                    <!-- Discount Value -->
                    <div class="space-y-1.5">
                        <label class="text-xs font-bold text-[#6e5a4e]">Discount Value</label>
                        <input type="number" min="0" step="0.01" th:field="*{discountValue}" placeholder="e.g. 15.00" required
                               class="w-full px-4 py-2.5 rounded-xl border border-[#3f291f]/15 bg-[#fffbf6] focus:outline-none focus:border-[#b4572d] text-sm font-medium">
                    </div>

                    <!-- Start Date -->
                    <div class="space-y-1.5">
                        <label class="text-xs font-bold text-[#6e5a4e]">Start Date</label>
                        <input type="date" th:field="*{startDate}" required
                               class="w-full px-4 py-2.5 rounded-xl border border-[#3f291f]/15 bg-[#fffbf6] focus:outline-none focus:border-[#b4572d] text-sm font-medium">
                    </div>

                    <!-- End Date -->
                    <div class="space-y-1.5">
                        <label class="text-xs font-bold text-[#6e5a4e]">End Date</label>
                        <input type="date" th:field="*{endDate}" required
                               class="w-full px-4 py-2.5 rounded-xl border border-[#3f291f]/15 bg-[#fffbf6] focus:outline-none focus:border-[#b4572d] text-sm font-medium">
                    </div>
                </div>
            </div>

            <!-- Submit action row -->
            <div class="flex items-center justify-end gap-3.5">
                <a th:href="@{/admin/promotions}" class="px-5 py-3 bg-white border border-[#3f291f]/10 hover:bg-[#fff5eb]/40 text-stone-600 text-xs font-semibold rounded-xl transition shadow-sm">
                    Cancel
                </a>
                <button type="submit" class="px-7 py-3 bg-[#b4572d] hover:bg-[#8f3c1c] text-white text-xs font-bold rounded-xl transition shadow-md shadow-[#b4572d]/15">
                    Save Campaign
                </button>
            </div>
        </form>
    </main>
</body>
</html>
