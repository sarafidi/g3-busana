<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Promotion Form</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Fraunces:opsz,wght@9..144,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin.css}"> 
     <script defer th:src="@{/js/admin.js}"></script>
</head>
<body class="admin-shell">
    <header class="admin-topbar"> 
        <div>
            <p class="eyebrow">Admin Panel</p>
            <h1 th:text="${pageTitle}">Add Promotion</h1>
        </div>
        <div class="button-row">
            <a class="button-secondary" th:href="@{/admin/dashboard}">
    ← Back to Dashboard
</a>
            <a class="button-primary" th:href="@{/admin/promotions}">Back To Promotion List</a>
        </div>
    </header> 

    <main class="admin-main">
<section class="surface-panel" th:if="${successMessage}">
            <p class="feedback success" th:text="${successMessage}"></p>
        </section>
        <section class="surface-panel" th:if="${errorMessage}">
            <p class="feedback error" th:text="${errorMessage}"></p>
        </section>

        <form class="product-form"
  th:action="${promotion?.promotionID != null} ? @{/admin/promotions/{id}(id=${promotion.promotionID})} : @{/admin/promotions}" 
      th:object="${promotion}" 
      method="POST">

            <section class="surface-panel form-section">
                <div class="section-heading">
                    <p class="eyebrow">Promotion Details</p>
                    <h2>Descriptive information</h2>
                </div>
                <div class="form-grid">
                    <label>
                        <span>Promotion ID</span>
<input type="text" id="promotionID" name="promotionID" th:value="*{promotionID}" placeholder="Auto-generated on save" readonly>                    </label> 
                    <label>
                        <span>Status</span>
                        <select th:field="*{status}">
                            <option value="active">Active</option>
                            <option value="inactive">Inactive</option>
                        </select>
                    </label>

                  <label>
                        <span>Promotion name</span>
                        <input type="text" th:field="*{promotionName}" placeholder="Hari Raya Sale" required>
                    </label>

                    <label>
    <span>Applicable Category</span>
    <select th:field="*{applicableCategory}" required>
        <option value="">Choose a category</option>
        <option value="Tops">Tops</option>
        <option value="Bottoms">Bottoms</option>
        <option value="Accessories">Accessories</option>
    </select>
</label>

                    <label>
                        <span>Discount Type</span>
                        <select th:field="*{discountType}" required>
                                <option value="">Choose a discount type</option>
                                <option value="Percentage">Percentage</option>
                                <option value="Fixed Amount">Fixed Amount</option>
                            </select>
                        </label>

                        <label>
                        <span>Discount Value</span>
                        <input type="number"
                            step="0.01"
                            min="0"
                            th:field="*{discountValue}"
                            placeholder="10.00"
                            required>
                    </label>

                    <label>
                        <span>Start Date</span>
                        <input type="date" th:field="*{startDate}" required>
                    </label>

                                    <label>
                    <span>End Date</span>
                    <input type="date" th:field="*{endDate}" required>
                </label>
                </div>
            </section>

            <section class="form-actions">
                <button class="button-primary" type="submit" th:text="${promotion.promotionID == null} ? 'Create Promotion' : 'Save Changes'">Create Promotion</button>
                <a class="button-secondary" th:href="@{/admin/promotions}">Cancel</a>
            </section>
        </form>
    </main>
</body>
</html>
