<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Order Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Fraunces:opsz,wght@9..144,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body class="admin-shell">
    <header class="admin-topbar">
        <div>
            <p class="eyebrow">Admin Panel</p>
            <h1>Promotions List</h1>
        </div>
        <div class="button-row">
            <a class="button-primary" th:if="${!#lists.isEmpty(promotions)}" th:href="@{/admin/promotions/new}">Add New Promotion</a>
        </div>
    </header>
    <main class="admin-main">
        <section class="surface-panel" th:if="${successMessage}">
            <p class="feedback success" th:text="${successMessage}"></p>
        </section>

        <section class="surface-panel" th:if="${errorMessage}">
            <p class="feedback error" th:text="${errorMessage}"></p>
        </section>
        <section class="catalogue-toolbar surface-panel">
            <div class="section-heading">
                <!-- <p class="eyebrow">Filters</p> -->
                <h2>View and manage promotions</h2>
            </div>
           <section class="empty-state surface-panel" th:if="${#lists.isEmpty(promotions)}">
            <h2>No promotions created yet.</h2>
             <p>Create the first promotion to make the promotions list visible.</p>
            <a class="button-primary" th:href="@{/admin/promotions/new}">Create Promotion</a>
        </section>
            <div class="table-container" th:if="${!#lists.isEmpty(promotions)}">
                <table style="width:100%" >
                <thead>
                <tr>
                    <th>Promotion ID</th>
                    <th>Promotion Name</th>
                    <th>Discount Type</th>
                    <th>Discount Value</th>
                    <th>Category</th>
                    <th>Start Date</th>
                    <th>End Date</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="promotion: ${promotions}">
                   <td th:text="${promotion.promotionID}"></td> 
                    <td th:text="${promotion.promotionName}"></td>
                    <td th:text="${promotion.discountType}"></td> 
                    <td th:text="${promotion.discountValue}"></td> 
                    <td th:text="${promotion.applicableCategory}"></td> 
                    <td th:text="${#temporals.format(promotion.startDate, 'dd MMM yyyy')}"></td> 
                    <td th:text="${#temporals.format(promotion.endDate, 'dd MMM yyyy')}"></td> 
                    <td th:text="${promotion.status}"></td> 
                     <td>
                    <form th:action="@{/admin/promotions/{promoId}/delete(promoId=${promotion.promotionID})}" method="POST"  onsubmit="return confirm('Delete this promotion permanently?');" style="display: flex; gap: 8px; justify-content: center;">
                            <a class="action-button" th:href="@{/admin/promotions/{id}/edit(id=${promotion.promotionID})}">Edit</a>
                            <button type="submit" class="action-button">Delete</button>
                        </form>
                        </td>
                </tr>
                </tbody>
                </table>
            </div>
        </section>
    </main>
</body>
</html>
