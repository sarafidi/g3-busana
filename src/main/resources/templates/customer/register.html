<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Registration | BUSANA.my</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f7fc; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { width: 100%; max-width: 480px; background: #ffffff; border-radius: 18px; box-shadow: 0 20px 60px rgba(0,0,0,0.08); padding: 36px; }
        h1 { margin: 0 0 24px; font-size: 1.9rem; color: #1e3a8a; }
        .field { margin-bottom: 18px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #2d3b50; }
        input { width: 100%; padding: 12px 14px; border: 1px solid #d1d9e6; border-radius: 12px; font-size: 1rem; }
        input:focus { outline: none; border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.14); }
        .button { width: 100%; padding: 14px 16px; border: none; border-radius: 12px; background: #4f46e5; color: #fff; font-size: 1rem; font-weight: 700; cursor: pointer; }
        .button:hover { background: #3730a3; }
        .message { margin-bottom: 18px; padding: 14px 16px; border-radius: 12px; }
        .success { background: #e7f5ec; color: #1f5c33; border: 1px solid #c7ebd0; }
        .error { background: #fcebea; color: #9f1239; border: 1px solid #f5c2c7; }
        .link-row { margin-top: 18px; font-size: 0.95rem; text-align: center; }
        .link-row a { color: #4f46e5; text-decoration: none; }
        .link-row a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Create your account</h1>

        <div th:if="${message}" class="message success" th:text="${message}"></div>
        <div th:if="${error}" class="message error" th:text="${error}"></div>

        <form th:action="@{/customer/register}" th:object="${customer}" method="post">
            <div class="field">
                <label for="customerID">Customer ID</label>
                <input type="text" id="customerID" th:field="*{customerID}" placeholder="Enter your customer ID" />
            </div>
            <div class="field">
                <label for="name">Full Name</label>
                <input type="text" id="name" th:field="*{name}" placeholder="John Doe" required />
            </div>
            <div class="field">
                <label for="email">Email</label>
                <input type="email" id="email" th:field="*{email}" placeholder="you@example.com" required />
            </div>
            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" th:field="*{password}" placeholder="Choose a password" required />
            </div>
            <div class="field">
                <label for="deliveryAddress">Delivery Address</label>
                <input type="text" id="deliveryAddress" th:field="*{deliveryAddress}" placeholder="123 Main Street" required />
            </div>
            <button type="submit" class="button">Register</button>
        </form>

        <div class="link-row">
            Already have an account? <a th:href="@{/customer/login}">Sign in</a>
        </div>
    </div>
</body>
</html>
