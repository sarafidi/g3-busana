<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title th:text="${pageTitle}">Shopping Cart - BUSANA.my</title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" th:href="@{/css/customer.css}">
    </head>

    <body class="customer-shell">
        <header>
            <div class="customer-topbar">
                <span class="brand-mark">BUSANA.my</span>
                <!-- Navbar (shared across all customer pages) -->
                <nav class="topbar-links">
                    <a th:href="@{/}">Home</a>
                    <a th:href="@{/products}">Shop</a>
                    <a th:href="@{/cart}" class="is-active">Cart</a>
                    <a th:href="@{/wishlist}">Wishlist</a>
                    <a th:href="@{/logout}">Logout</a>
                </nav>
            </div>
        </header>

        <!-- Page content -->
        <main class="catalogue-main">
            <!-- Page heading -->
            <div class="hero-card" style="margin-bottom: 1.25rem;">
                <p class="eyebrow">Your Selection</p>
                <h1>Shopping Cart</h1>
            </div>

            <!-- Error message -->
            <p th:if="${error}" th:text="${error}" class="feedback error" style="margin-bottom: 1rem;"></p>

            <!-- Empty cart state -->
            <div th:if="${#lists.isEmpty(cartItems)}" class="surface-panel empty-state">
                <p class="muted-text">Your cart is empty</p>
                <a th:href="@{/products}" class="button-primary" style="margin-top: 1rem; display: inline-flex;">
                    Continue Shopping
                </a>
            </div>

            <div th:unless="${#lists.isEmpty(cartItems)}" class="results-panel">
                
                <!-- Each cart item -->
                <div th:each="cartItem : ${cartItems}" class="surface-panel">
                    <div style="display: flex; justify-content: space-between; align-items: start; gap: 1rem; flex-wrap: wrap;">
                        
                        <!-- Item info -->
                        <div style="display: grid; gap: 0.4rem;">
                            <p class="eyebrow" th:text="${cartItem.variant.variantLabel}">Size / Colour</p>
                            <h3 style="margin: 0;" th:text="${cartItem.variant.product.name}">Product Name</h3>
                            <p class="price-tag">
                                RM <span th:text="${cartItem.subtotal}">0</span>
                            </p>
                            <p class="muted-text">
                                Qty: <span th:text="${cartItem.quantity}">1</span>
                            </p>
                        </div>

                        <!-- Update + Remove actions -->
                        <div style="display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: center;">
                            <!-- Update quantity form -->
                            <form th:action="@{/cart/update}" method="post" style="display: flex; gap: 0.5rem; align-items: center">
                                <input type="hidden" name="cartItemID" th:value="${cartItem.cartItemID}">
                                <input type="number" name="quantity" th:value="${cartItem.quantity}" min="1"
                                    style="width:70px; padding:0.6rem 0.8rem; border-radius:12px; border:1px solid rgba(45,32,26,0.12); font:inherit;">
                                <button type="submit" class="button-secondary">Update</button>
                            </form>

                            <!-- Remove form  -->
                            <form th:action="@{/cart/remove}" method="post">
                                <input type="hidden" name="cartItemID" th:value="${cartItem.cartItemID}">
                                <button type="submit" class="button-secondary" style="color: #8d2415;">Remove</button>
                            </form>
                        </div>
                    </div>
                </div>

                <!-- Checkout button -->
                <div class="surface-panel" style="display: flex; justify-content: flex-end;">
                    <a th:href="@{/checkout}" class="button-primary">Proceed to Checkout -></a>
                </div>
            </div>
        </main>

        <footer style="text-align: center; padding: 2rem; color:var(--customer-muted); font-size:0.9rem">
            BUSANA.my &copy; 2025
        </footer>

        <script th:src="@{/js/customer.js}" async defer></script>
    </body>
</html>
