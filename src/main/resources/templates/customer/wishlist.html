<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title th:text="${pageTitle}">Wishlist - BUSANA.my</title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" th:href="@{/css/customer.css}">
    </head>

    <body class="customer-shell">
        <header>
            <div class="customer-topbar">
                <a class="brand-mark" th:href="@{/}">BUSANA.my</a>
                <!-- Navbar (shared across all customer pages) -->
                <nav class="topbar-links">
                    <a th:href="@{/customer/home}">Home</a>
                    <a th:href="@{/customer/products}">Catalogue</a>
                    <a class="is-active" th:href="@{/wishlist}">Wishlist</a>
                    <a th:href="@{/customer/cart}">My Shopping Cart</a>
                </nav>
                <div class="profile-dropdown" th:if="${session.customerID != null}">
                    <button class="profile-btn">
                        <span th:text="${session.customerName ?: 'Profile'}">Profile</span>
                        <svg class="dropdown-arrow" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" />
                        </svg>
                    </button>
                    <div class="dropdown-content">
                        <a th:href="@{/logout}">Logout</a>
                    </div>
                </div>
                <div th:if="${session.customerID == null}">
                    <a th:href="@{/customer/login}" class="profile-btn">Login</a>
                </div>
            </div>
        </header>

        <!-- Page content -->
        <main class="catalogue-main">
            <!-- Page heading -->
            <div class="hero-card" style="margin-bottom: 1.25rem;">
                <p class="eyebrow">Your Selection</p>
                <h1>Wishlist</h1>
            </div>

            <!-- Error message -->
            <p th:if="${error}" th:text="${error}" class="feedback error" style="margin-bottom: 1rem;"></p>

            <!-- Empty wishlist state -->
            <div th:if="${#lists.isEmpty(wishlistItems)}" class="surface-panel empty-state" style="padding: 4rem 1rem;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width: 3.5rem; height: 3.5rem; color: var(--customer-muted); margin: 0 auto 1.25rem;">
                    <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                </svg>
                <h3 style="margin-bottom: 0.5rem; font-family: 'Prata', Georgia, serif; font-weight: 400; font-size: 1.5rem;">Your wishlist is empty</h3>
                <p class="muted-text" style="margin-bottom: 1.5rem;">Save your favourite items here to view them later.</p>
                <a th:href="@{/customer/products}" class="button-primary" style="display: inline-flex;">
                    Browse Catalogue
                </a>
            </div>

            <div th:unless="${#lists.isEmpty(wishlistItems)}" class="results-panel">
                <div class="product-grid">
                    <div class="product-card" th:each="wishlistItem : ${wishlistItems}">
                        
                        <!-- Product link wraps the image and details -->
                        <a th:href="@{/customer/products/{productId}(productId=${wishlistItem.variant.product.productID})}" class="product-card-link" style="display: block; text-decoration: none; color: inherit;">
                            <div class="product-card-media" style="position: relative;">
                                <img
                                    th:if="${wishlistItem.variant.product.primaryImage != ''}"
                                    th:src="${wishlistItem.variant.product.primaryImage}"
                                    th:alt="${wishlistItem.variant.product.name}">
                                <div class="image-fallback" th:if="${wishlistItem.variant.product.primaryImage == ''}">
                                    <span>BUSANA</span>
                                </div>
                            </div>

                            <div class="product-card-content">
                                <div class="card-badges">
                                    <span class="badge badge-soft" th:text="${wishlistItem.variant.product.categoryName}">Category</span>
                                    <span class="badge" th:classappend="${wishlistItem.variant.available} ? ' badge-success' : ' badge-muted'"
                                        th:text="${wishlistItem.variant.available} ? 'In Stock' : 'Out of Stock'">
                                        In Stock
                                    </span>
                                </div>

                                <div class="card-copy">
                                    <h3 th:text="${wishlistItem.variant.product.name}">Product Name</h3>
                                </div>

                                <div class="card-meta">
                                    <p class="price-tag" th:text="|RM ${#numbers.formatDecimal(wishlistItem.variant.product.basePrice, 1, 'COMMA', 2, 'POINT')}|">RM 0.00</p>
                                    <p class="variant-line" th:text="|Selected: ${wishlistItem.variant.variantLabel}|">Variant: Black / M</p>
                                </div>
                            </div>
                        </a>

                        <!-- Actions block outside the main link but inside the card -->
                        <div style="padding: 0 1.25rem 1.25rem 1.25rem; display: flex; flex-direction: column; gap: 0.5rem; margin-top: auto;">
                            <!-- Add to Cart Form (if variant is in stock) -->
                            <form th:action="@{/cart/add}" method="post" th:if="${wishlistItem.variant.available}">
                                <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                <input type="hidden" name="variantID" th:value="${wishlistItem.variant.variantID}" />
                                <input type="hidden" name="quantity" value="1" />
                                <button type="submit" class="button-primary" style="width: 100%; font-size: 0.85rem; padding: 0.6rem 1rem;">
                                    Add to Cart
                                </button>
                            </form>
                            
                            <!-- Remove Form -->
                            <form th:action="@{/wishlist/remove}" method="post" style="width: 100%;">
                                <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                <input type="hidden" name="wishlistItemID" th:value="${wishlistItem.wishlistItemID}">
                                <button type="submit" class="button-secondary" style="width: 100%; font-size: 0.85rem; padding: 0.6rem 1rem; color: #8d2415; border-color: rgba(141, 36, 21, 0.25);">
                                    Remove
                                </button>
                            </form>
                        </div>
                    </div>
                </div>

                <!-- Back to products button -->
                <div style="display: flex; justify-content: flex-end; margin-top: 1.5rem;">
                    <a th:href="@{/customer/products}" class="button-secondary">
                        ← Continue Shopping
                    </a>
                </div>
            </div>
        </main>

        <footer style="text-align: center; padding: 2rem; color:var(--customer-muted); font-size:0.9rem">
            BUSANA.my &copy; 2025
        </footer>

        <script th:src="@{/js/customer.js}" async defer></script>
    </body>
</html>
