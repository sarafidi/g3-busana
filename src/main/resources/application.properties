spring.application.name=busana

# --- 1. Database connection settings --------------------------------
spring.datasource.url=jdbc:mysql://localhost:3306/busana?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=admin123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.profiles.active=local

# --- 2. HIbernate/JPA properties --------------------------------
# 'validate' ensures Spring Boot checks you Java entities against the init-schema.sql tables perfectly at startup
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# --- 3. Thymeleaf --------------------------------
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# --- 4. Server --------------------------------
server.port=8080

# --- 5. File Upload (for product images) --------------------------------
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB